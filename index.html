<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出貨單轉置工具 V13 (MOMO 自動解密版)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    
    <style>
        /* 樣式保持與 V12 相同，新增 Loading 動畫樣式 */
        :root { --primary: #4F46E5; --bg: #F3F4F6; --text: #1F2937; }
        body { font-family: 'Segoe UI', '微軟正黑體', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: relative;}
        .header { text-align: center; margin-bottom: 20px; }
        .upload-zone { border: 2px dashed #CBD5E1; border-radius: 8px; padding: 30px; text-align: center; background: #F8FAFC; cursor: pointer; }
        .upload-zone.dragover { border-color: var(--primary); background: #EEF2FF; }
        
        .summary-section { margin-top: 30px; }
        .preview-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; background: #fff; white-space: nowrap; }
        .preview-table th, .preview-table td { border: 1px solid #E5E7EB; padding: 8px 10px; text-align: left; }
        .preview-table th { background-color: #F9FAFB; font-weight: 600; position: sticky; top: 0;}
        .preview-table tr:hover { background-color: #F3F4F6; }
        .preview-table .col-address { white-space: normal; min-width: 150px; max-width: 250px;}
        .preview-table .col-product { white-space: normal; min-width: 150px; max-width: 300px;}

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; letter-spacing: 1px; display: inline-block; }
        .platform-label { padding: 4px 12px; border-radius: 4px; font-size: 16px; font-weight: bold; letter-spacing: 1px; display: inline-block; }
        .pchome-style { background-color: #000; color: #fff; border: 2px solid #000; }
        .momo-style { background-color: #fff; color: #000; border: 2px solid #000; }
        .packing-style { background-color: #e5e7eb; color: #374151; border: 2px solid #9ca3af; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;}
        .btn-print { flex: 2; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; font-weight: bold; }
        .btn-copy { flex: 1; padding: 15px; background: #10B981; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-clear { flex: 1; padding: 15px; background: white; color: #DC2626; border: 1px solid #DC2626; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* 載入中遮罩 */
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; border-radius: 12px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #print-area { display: none; }

        /* 列印樣式 */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            #print-area { display: block; }
            @page { size: A4 portrait; margin: 0; }
            .order-ticket { width: 210mm; height: 148.5mm; box-sizing: border-box; padding: 12mm 15mm; border-bottom: 1px dashed #999; page-break-inside: avoid; position: relative;}
            .order-ticket:nth-child(even) { page-break-after: always; border-bottom: none; }
            .ticket-header { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 10px; }
            .info-wrapper { display: flex; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
            .customer-info { flex: 1; font-size: 14px; padding: 8px; border: 1px solid #000; background: #fff; line-height: 1.5; margin-bottom: 0; }
            .logistics-box { width: 180px; border: 1px solid #000; padding: 8px; display: flex; flex-direction: column; background: #fff; }
            .logistics-box .title { font-size: 12px; font-weight: bold; margin-bottom: auto; }
            .logistics-box .line { border-bottom: 1px dotted #000; height: 30px; margin-bottom: 5px;}
            .item-table { width: 100%; border-collapse: collapse; font-size: 12px; }
            .item-table th, .item-table td { border: 1px solid #000; padding: 6px; }
            .item-table th { background-color: #f2f2f2; }
            .total-amount { text-align: right; margin-top: 8px; font-weight: bold; font-size: 15px;}
        }
    </style>
</head>
<body>

<div id="app">
    <div class="container no-print">
        <div class="loading-overlay" v-if="isLoading">
            <div class="spinner"></div>
            <h3 style="color: #4F46E5;">{{ loadingText }}</h3>
            <p>這可能需要幾秒鐘的時間...</p>
        </div>

        <div class="header">
            <h1>📦 出貨單轉置工具 V13 (伺服器自動解密版)</h1>
            <p>支援直接拖入「加密的 MOMO.xls」，系統將於背景自動解密處理</p>
        </div>

        <div class="upload-zone" :class="{ dragover: isDragging }" @dragover.prevent="isDragging = true" @dragleave.prevent="isDragging = false" @drop.prevent="handleDrop" @click="$refs.fileInput.click()">
            <input type="file" ref="fileInput" @change="handleFileSelect" accept=".csv, .xls, .xlsx" style="display: none;" multiple>
            <svg style="width: 50px; height: 50px; color: #9CA3AF; margin-bottom: 10px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <h3>將 PCHOME(CSV) 或 MOMO(加密XLS) 拖曳至此</h3>
            <p style="color: #6B7280;">不需手動解密，系統為您自動辦妥</p>
        </div>

        <div v-if="orders.length > 0" class="summary-section">
            <h3 style="display: flex; justify-content: space-between; align-items: center;">
                <span>📊 統整資料列表 (一鍵複製，貼上不跑版)</span>
                <span style="font-size: 14px; font-weight: normal; color: #666;">目前共 {{ orders.length }} 筆訂單</span>
            </h3>
            
            <div style="overflow-x: auto; max-height: 500px; border: 1px solid #E5E7EB;">
                <table class="preview-table" ref="previewTable">
                    <thead>
                        <tr>
                            <th>來源</th><th>訂單編號</th><th>收件人</th><th>電話</th><th>地址</th>
                            <th>商品名稱</th><th>規格</th><th>料號</th><th>單價</th><th>數量</th><th>金額</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template v-for="order in orders" :key="order.orderId">
                            <tr v-for="(item, idx) in order.items" :key="idx">
                                <td><span v-if="idx === 0" class="badge" :class="order.platform === 'PCHOME' ? 'pchome-style' : 'momo-style'">{{ order.platform }}</span></td>
                                <td><span v-if="idx === 0">'{{ order.orderId }}</span></td>
                                <td><span v-if="idx === 0">{{ order.name }}</span></td>
                                <td><span v-if="idx === 0 && order.phone">'{{ order.phone }}</span></td>
                                <td class="col-address"><span v-if="idx === 0">{{ order.address }}</span></td>
                                <td class="col-product">{{ item.name }}</td>
                                <td>{{ item.spec }}</td>
                                <td><template v-if="item.sku">'{{ item.sku }}</template></td>
                                <td>{{ order.platform === 'PCHOME' ? item.price : '-' }}</td>
                                <td>{{ item.qty }}</td>
                                <td>
                                    <template v-if="order.platform === 'PCHOME'">{{ item.subtotal }}</template>
                                    <template v-else-if="idx === 0">總額: {{ order.totalAmount }}</template>
                                    <template v-else>-</template>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div class="btn-group">
                <button class="btn-print" @click="printPage">🖨️ 確認無誤，開始列印出貨單</button>
                <button class="btn-copy" @click="copyToExcel">📋 一鍵複製至 Excel</button>
                <button class="btn-clear" @click="clearData">🗑️ 清空重新匯入</button>
            </div>
        </div>
    </div>

    <div id="print-area">
        <template v-for="order in orders" :key="order.orderId">
            <div class="order-ticket">
                <div class="ticket-header">
                    <div><span class="platform-label" :class="order.platform === 'PCHOME' ? 'pchome-style' : 'momo-style'">{{ order.platform }}</span>
                    <h2 style="display:inline; margin-left:10px; font-size: 20px;">倉庫出貨作業單</h2></div>
                    <div style="text-align:right"><svg class="barcode" :data-value="order.orderId"></svg>
                    <div style="font-size:11px; font-weight:bold; margin-top:2px;">{{ order.orderId }}</div></div>
                </div>
                <div class="info-wrapper">
                    <div class="customer-info">
                        <strong>收件人：{{ order.name }}</strong><br>
                        <span v-if="order.platform === 'PCHOME'"><strong>電話：{{ order.phone }}</strong><br>地址：{{ order.address }}</span>
                        <span v-else style="color:#555;">電話：(平台不顯示)<br>地址：(平台不顯示)</span>
                    </div>
                    <div class="logistics-box" v-if="order.platform === 'PCHOME'">
                        <div class="title">回填黑貓物流單號：</div><div class="line"></div>
                    </div>
                </div>
                <table class="item-table">
                    <thead><tr><th style="width: 35px;">核對</th><th>商品明細 / 料號</th><th style="text-align: right;" v-if="order.platform==='PCHOME'">單價</th><th style="width: 50px;">數量</th><th style="text-align: right;" v-if="order.platform==='PCHOME'">小計</th></tr></thead>
                    <tbody><tr v-for="item in order.items"><td style="text-align:center"><span style="display:inline-block; width:14px; height:14px; border:1px solid #000; vertical-align: middle;"></span></td>
                    <td>{{ item.name }}<br><span style="color:#444;">規格：{{ item.spec }}</span><br><small>料號：{{ item.sku }}</small></td>
                    <td style="text-align: right;" v-if="order.platform==='PCHOME'">${{ item.price }}</td><td style="text-align:center; font-weight:bold; font-size: 14px;">{{ item.qty }}</td><td style="text-align: right;" v-if="order.platform==='PCHOME'">${{ item.subtotal }}</td></tr></tbody>
                </table>
                <div class="total-amount">{{ order.platform==='PCHOME' ? '訂單總金額' : '訂單開立發票金額' }}: ${{ order.totalAmount }}</div>
            </div>
            <div class="order-ticket">
                <div class="ticket-header">
                    <div><span class="platform-label packing-style">{{ order.platform }}</span><h2 style="display:inline; margin-left:10px; font-size: 20px;">🧾 裝箱明細</h2></div>
                    <div style="text-align:right"><svg class="barcode" :data-value="order.orderId"></svg>
                    <div style="font-size:11px; font-weight:bold; margin-top:2px;">{{ order.orderId }}</div></div>
                </div>
                <div class="customer-info" style="border: 1px solid #ccc;">
                    <div>收件人：<strong>{{ order.name }}</strong> 先生/小姐</div>
                    <div style="font-size: 12px; margin-top: 4px; color: #555;">感謝您的購買，請核對箱內商品品項與數量。</div>
                </div>
                <table class="item-table" style="margin-top: 10px;">
                    <thead><tr><th style="width: 35px;">核對</th><th>商品名稱 / 規格</th><th style="width: 50px;">數量</th></tr></thead>
                    <tbody><tr v-for="item in order.items"><td style="text-align:center"><span style="display:inline-block; width:14px; height:14px; border:1px solid #000; vertical-align: middle;"></span></td>
                    <td>{{ item.name }}<br><span style="font-size: 11px;">規格：{{ item.spec }}</span></td><td style="text-align:center; font-weight:bold; font-size: 14px;">{{ item.qty }}</td></tr></tbody>
                </table>
            </div>
        </template>
    </div>
</div>

<script>
    const { createApp, ref, nextTick } = Vue;
    createApp({
        setup() {
            const isDragging = ref(false);
            const isLoading = ref(false);
            const loadingText = ref('');
            const orders = ref([]);
            const previewTable = ref(null); 
            
            const cleanValue = (v) => v ? v.replace(/^="*/, '').replace(/"*$/, '').trim() : '';
            const cleanAddress = (v) => cleanValue(v).replace(/\(\d+\)$/, '').trim();
            const cleanProductName = (name) => cleanValue(name).replace(/\s*\([A-Za-z0-9-]+\)$/, '').trim();

            const processCSV = (text) => {
                let platform = 'UNKNOWN';
                if (text.includes('收貨地址') || text.includes('PCHOME')) platform = 'PCHOME';
                else if (text.includes('收件人姓名') && text.includes('訂單編號')) platform = 'MOMO';

                if (platform === 'UNKNOWN') return alert('無法識別此檔案格式！');
                if (platform === 'PCHOME') {
                    let lines = text.split('\n');
                    let idx = lines.findIndex(l => l.includes('訂單編號') && l.includes('收貨人'));
                    if (idx !== -1) text = lines.slice(idx).join('\n');
                }

                Papa.parse(text, {
                    header: true, skipEmptyLines: true,
                    complete: (res) => {
                        let grouped = {};
                        res.data.forEach(row => {
                            let id = cleanValue(row['訂單編號']);
                            if (!id) return;
                            
                            if (!grouped[id]) {
                                grouped[id] = { 
                                    orderId: id, platform, name: cleanValue(row[platform==='PCHOME' ? '收貨人' : '收件人姓名']), 
                                    phone: platform==='PCHOME' ? cleanValue(row['收貨人手機']) : '', address: platform==='PCHOME' ? cleanAddress(row['收貨地址(訂單編號)']) : '', 
                                    items: [], totalAmount: platform==='MOMO' ? (parseInt(cleanValue(row['訂單金額加總'])) || 0) : 0 
                                };
                            }
                            if (platform === 'PCHOME') {
                                let sub = parseInt(cleanValue(row['成本小計'])) || 0;
                                grouped[id].totalAmount += sub;
                                grouped[id].items.push({ name: cleanProductName(row['商品名稱']), spec: cleanValue(row['商品規格']), qty: cleanValue(row['應出貨數量']), sku: cleanValue(row['廠商料號']), price: cleanValue(row['單位成本']), subtotal: sub });
                            } else {
                                grouped[id].items.push({ name: cleanValue(row['商品名稱']), spec: [cleanValue(row['規格1']), cleanValue(row['規格2'])].filter(Boolean).join(' / '), qty: cleanValue(row['數量']), sku: cleanValue(row['商品原廠編號']) || cleanValue(row['商品編號']), price: null, subtotal: null });
                            }
                        });
                        orders.value.push(...Object.values(grouped));
                        nextTick(() => {
                            document.querySelectorAll('.barcode').forEach(svg => {
                                let id = svg.getAttribute('data-value');
                                if (id && !svg.hasAttribute('data-rendered')) {
                                    JsBarcode(svg, id, { format: "CODE128", width: 1.2, height: 35, displayValue: false, margin: 0 });
                                    svg.setAttribute('data-rendered', 'true');
                                }
                            });
                        });
                    }
                });
            };

            const readFile = async (file) => {
                if (!file) return;
                
                // 判斷是否為加密的 Excel 檔案 (MOMO)
                if (file.name.toLowerCase().endsWith('.xls') || file.name.toLowerCase().endsWith('.xlsx')) {
                    isLoading.value = true;
                    loadingText.value = `正在雲端解密檔案：${file.name}`;
                    
                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const response = await fetch('/.netlify/functions/decrypt', {
                                method: 'POST',
                                body: JSON.stringify({ data: e.target.result })
                            });
                            const result = await response.json();
                            if (result.error) throw new Error(result.error);
                            processCSV(result.csv);
                        } catch (err) {
                            alert(`解密失敗: ${err.message}`);
                        } finally {
                            isLoading.value = false;
                        }
                    };
                    reader.readAsDataURL(file); // 轉為 Base64
                } else {
                    // PCHOME 或是已解密的 CSV 走本地解析
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const buf = e.target.result;
                        let txt = '';
                        try {
                            txt = new TextDecoder('utf-8').decode(buf);
                            if (!txt.includes('訂單編號')) txt = new TextDecoder('big5').decode(buf);
                            if (!txt.includes('訂單編號')) txt = new TextDecoder('utf-16le').decode(buf);
                        } catch (err) { console.error("解碼錯誤", err); }
                        processCSV(txt);
                    };
                    reader.readAsArrayBuffer(file);
                }
            };

            const handleDrop = (e) => { isDragging.value = false; Array.from(e.dataTransfer.files).forEach(readFile); };
            const handleFileSelect = (e) => { Array.from(e.target.files).forEach(readFile); };
            const printPage = () => window.print();
            const clearData = () => { if(confirm('確定要清空目前列表嗎？')) orders.value = []; };
            const copyToExcel = () => {
                if (!previewTable.value) return;
                const range = document.createRange();
                range.selectNode(previewTable.value);
                const selection = window.getSelection();
                selection.removeAllRanges();
                selection.addRange(range);
                try { document.execCommand('copy'); alert('✅ 已複製！請直接至 Excel 貼上 (Ctrl+V)。'); } 
                catch (err) { alert('複製失敗。'); }
                selection.removeAllRanges();
            };

            return { isDragging, isLoading, loadingText, orders, previewTable, handleDrop, handleFileSelect, printPage, clearData, copyToExcel };
        }
    }).mount('#app');
</script>
</body>
</html>
